<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static Input</title>
<style>
  body { font-family: sans-serif; margin: 2rem; }

  .input {
    display: flex;
    width: 100%;
    height: 2.25rem; /* h-9 */
    padding: 0.25rem 0.75rem; /* py-1 px-3 */
    font-size: 1rem;
    border: 1px solid #d1d5db; /* border-input */
    border-radius: 0.375rem; /* rounded-md */
    background: transparent;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05); /* shadow-sm */
    transition: border 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .input::placeholder {
    color: #6b7280; /* placeholder:text-muted-foreground */
  }

  .input:focus-visible {
    outline: none;
    border-color: #3b82f6; /* ring-ring */
    box-shadow: 0 0 0 1px #3b82f6;
  }

  .input:disabled {
    cursor: not-allowed;
    opacity: 0.5;
  }

  /* File input styling */
  .input[type="file"] {
    padding: 0;
  }
  .input[type="file"]::-webkit-file-upload-button {
    border: none;
    background: transparent;
    font-size: 0.875rem; /* text-sm */
    font-weight: 500; /* font-medium */
    color: #111827; /* text-foreground */
    cursor: pointer;
  }

  @media (min-width: 768px) {
    .input { font-size: 0.875rem; } /* md:text-sm */
  }
</style>
</head>
<body>

<input type="text" class="input" placeholder="Enter text here" />
<br><br>
<input type="file" class="input" />

</body>
</html>
