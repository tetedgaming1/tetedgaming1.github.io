<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toast Notifications</title>
<style>
  body {
    font-family: sans-serif;
    padding: 2rem;
    background-color: #f9fafb;
  }

  /* Toast container */
  .toast-container {
    position: fixed;
    top: 1rem;
    right: 1rem;
    display: flex;
    flex-direction: column-reverse;
    gap: 0.5rem;
    z-index: 100;
    max-width: 420px;
  }

  /* Toast */
  .toast {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.5rem;
    border-radius: 0.375rem;
    border: 1px solid #d1d5db;
    background-color: #fff;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    opacity: 0;
    transform: translateX(100%);
    animation: slide-in 0.3s forwards;
    position: relative;
  }

  /* Variants */
  .toast.destructive {
    border-color: #f87171;
    background-color: #f87171;
    color: #fff;
  }

  /* Toast content */
  .toast-title {
    font-weight: 600;
    margin-bottom: 0.25rem;
  }
  .toast-description {
    font-size: 0.875rem;
    opacity: 0.9;
  }

  /* Toast buttons */
  .toast button {
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0.25rem;
    border-radius: 0.25rem;
  }

  .toast-close {
    position: absolute;
    top: 0.25rem;
    right: 0.25rem;
    font-weight: bold;
    font-size: 1rem;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .toast-close:hover {
    opacity: 1;
  }

  /* Animations */
  @keyframes slide-in {
    from { opacity: 0; transform: translateX(100%); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slide-out {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(100%); }
  }
</style>
</head>
<body>

<h2>Toast Notifications Example</h2>
<button onclick="showToast('Hello World!', 'This is a default toast.')">Show Toast</button>
<button onclick="showToast('Error!', 'Something went wrong.', true)">Show Destructive Toast</button>

<div class="toast-container" id="toast-container"></div>

<script>
  function showToast(title, description, destructive = false, duration = 3000) {
    const container = document.getElementById('toast-container');
    
    const toast = document.createElement('div');
    toast.className = 'toast' + (destructive ? ' destructive' : '');
    
    const content = document.createElement('div');
    content.innerHTML = `<div class="toast-title">${title}</div><div class="toast-description">${description}</div>`;
    toast.appendChild(content);

    const closeButton = document.createElement('button');
    closeButton.className = 'toast-close';
    closeButton.innerHTML = '✕';
    closeButton.onclick = () => removeToast(toast);
    toast.appendChild(closeButton);

    container.appendChild(toast);

    // Auto-remove after duration
    setTimeout(() => removeToast(toast), duration);
  }

  function removeToast(toast) {
    toast.style.animation = 'slide-out 0.3s forwards';
    toast.addEventListener('animationend', () => toast.remove());
  }
</script>

</body>
</html>
