<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static Form</title>
<style>
  body { font-family: sans-serif; margin: 2rem; }
  .form-item { margin-bottom: 1rem; }
  .form-label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
  .form-description { font-size: 0.8rem; color: #6b7280; margin-bottom: 0.25rem; }
  .form-message { font-size: 0.8rem; font-weight: 500; color: #dc2626; }
  .form-input { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; }
  .form-input.invalid { border-color: #dc2626; }
</style>
</head>
<body>

<form id="myForm" novalidate>
  <div class="form-item" id="item-name">
    <label for="input-name" class="form-label">Name</label>
    <input type="text" id="input-name" class="form-input" aria-describedby="desc-name msg-name" required />
    <p class="form-description" id="desc-name">Enter your full name.</p>
    <p class="form-message" id="msg-name"></p>
  </div>

  <div class="form-item" id="item-email">
    <label for="input-email" class="form-label">Email</label>
    <input type="email" id="input-email" class="form-input" aria-describedby="desc-email msg-email" required />
    <p class="form-description" id="desc-email">Enter a valid email address.</p>
    <p class="form-message" id="msg-email"></p>
  </div>

  <button type="submit">Submit</button>
</form>

<script>
  const form = document.getElementById('myForm');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const inputs = form.querySelectorAll('input');
    let valid = true;

    inputs.forEach(input => {
      const messageEl = document.getElementById('msg-' + input.id.split('-')[1]);
      if (!input.checkValidity()) {
        input.classList.add('invalid');
        messageEl.textContent = input.validationMessage;
        valid = false;
      } else {
        input.classList.remove('invalid');
        messageEl.textContent = '';
      }
    });

    if (valid) {
      alert('Form submitted successfully!');
      form.reset();
    }
  });
</script>

</body>
</html>
