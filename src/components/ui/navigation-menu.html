<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Static Navigation Menu</title>
<style>
  body { font-family: sans-serif; margin: 2rem; }

  /* Navigation Menu container */
  .nav-menu {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    position: relative;
  }

  .nav-item {
    position: relative;
  }

  /* Trigger buttons */
  .nav-trigger {
    display: inline-flex;
    align-items: center;
    padding: 0.5rem 1rem;
    border-radius: 0.375rem;
    background: #fff;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 500;
    transition: background 0.2s, color 0.2s;
    user-select: none;
  }
  .nav-trigger:hover {
    background: #3b82f6;
    color: #fff;
  }

  /* Chevron icon */
  .chevron-down {
    display: inline-block;
    margin-left: 0.25rem;
    width: 0.75rem;
    height: 0.75rem;
    border-right: 2px solid currentColor;
    border-top: 2px solid currentColor;
    transform: rotate(45deg);
    transition: transform 0.3s;
  }

  /* Submenu dropdown */
  .nav-submenu {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    min-width: 12rem;
    background: #fff;
    border: 1px solid #d1d5db;
    border-radius: 0.375rem;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    padding: 0.25rem 0;
    z-index: 50;
  }

  .nav-item:hover > .nav-submenu {
    display: block;
  }

  .nav-link {
    display: block;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
    cursor: pointer;
    border-radius: 0.25rem;
  }
  .nav-link:hover {
    background: #3b82f6;
    color: #fff;
  }

  /* Indicator triangle */
  .nav-indicator {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    width: 0.5rem;
    height: 0.5rem;
    background: #d1d5db;
    display: none;
  }

  .nav-item:hover > .nav-indicator {
    display: block;
  }
</style>
</head>
<body>

<nav class="nav-menu">
  <div class="nav-item">
    <div class="nav-trigger">
      Products <span class="chevron-down"></span>
    </div>
    <div class="nav-submenu">
      <div class="nav-link">Analytics</div>
      <div class="nav-link">Marketing</div>
      <div class="nav-link">Commerce</div>
    </div>
    <div class="nav-indicator"></div>
  </div>

  <div class="nav-item">
    <div class="nav-trigger">
      Company <span class="chevron-down"></span>
    </div>
    <div class="nav-submenu">
      <div class="nav-link">About Us</div>
      <div class="nav-link">Careers</div>
      <div class="nav-link">Contact</div>
    </div>
    <div class="nav-indicator"></div>
  </div>

  <div class="nav-item">
    <div class="nav-trigger">Pricing</div>
  </div>
</nav>

</body>
</html>
