<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resizable Panels</title>
<style>
  body, html {
    margin: 0;
    height: 100%;
    font-family: sans-serif;
  }

  .panel-group {
    display: flex;
    width: 100%;
    height: 100vh;
  }

  .panel {
    flex: 1;
    overflow: auto;
    padding: 16px;
    border: 1px solid #ccc;
    background-color: #f0f0f0;
  }

  .panel:nth-child(2) {
    background-color: #e0e0e0;
  }

  .resize-handle {
    width: 8px;
    cursor: ew-resize;
    background-color: #bbb;
    position: relative;
  }

  /* Grip lines */
  .resize-handle::before {
    content: '';
    position: absolute;
    top: 20%;
    bottom: 20%;
    left: 50%;
    width: 2px;
    background: #888;
    transform: translateX(-50%);
  }
</style>
</head>
<body>

<div class="panel-group" id="panelGroup">
  <div class="panel" id="panel1">Panel 1 content</div>
  <div class="resize-handle" id="handle"></div>
  <div class="panel" id="panel2">Panel 2 content</div>
</div>

<script>
  const handle = document.getElementById('handle');
  const panel1 = document.getElementById('panel1');
  const panel2 = document.getElementById('panel2');

  let isResizing = false;

  handle.addEventListener('mousedown', function(e) {
    isResizing = true;
    document.body.style.cursor = 'ew-resize';
  });

  document.addEventListener('mousemove', function(e) {
    if (!isResizing) return;
    const containerOffsetLeft = panel1.parentNode.offsetLeft;
    const pointerRelativeXpos = e.clientX - containerOffsetLeft;
    const minWidth = 50;
    const maxWidth = panel1.parentNode.offsetWidth - minWidth - handle.offsetWidth;

    if (pointerRelativeXpos < minWidth || pointerRelativeXpos > maxWidth) return;

    panel1.style.flex = 'none';
    panel2.style.flex = 'none';
    panel1.style.width = pointerRelativeXpos + 'px';
    panel2.style.width = (panel1.parentNode.offsetWidth - pointerRelativeXpos - handle.offsetWidth) + 'px';
  });

  document.addEventListener('mouseup', function(e) {
    if (isResizing) {
      isResizing = false;
      document.body.style.cursor = 'default';
    }
  });
</script>

</body>
</html>
