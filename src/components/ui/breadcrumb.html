<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breadcrumb Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    nav.breadcrumb {
      font-size: 0.875rem; /* text-sm */
      color: #6b7280; /* muted text */
    }

    nav.breadcrumb ol {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem; /* 1.5 */
      list-style: none;
      padding: 0;
      margin: 0;
    }

    nav.breadcrumb li {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
    }

    nav.breadcrumb a {
      text-decoration: none;
      color: #6b7280;
      transition: color 0.2s;
    }
    nav.breadcrumb a:hover {
      color: #111827; /* hover text */
    }

    nav.breadcrumb .current-page {
      font-weight: normal;
      color: #111827;
    }

    nav.breadcrumb svg {
      width: 14px; /* 3.5 * 4px */
      height: 14px;
      fill: currentColor;
    }

    .ellipsis {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
    }
    .ellipsis svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>
  <h1>Breadcrumb Example</h1>

  <nav class="breadcrumb" aria-label="breadcrumb">
    <ol>
      <li>
        <a href="#">Home</a>
        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </li>
      <li>
        <a href="#">Library</a>
        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </li>
      <li>
        <span class="current-page" aria-current="page">Data</span>
      </li>
    </ol>
  </nav>

  <!-- Example with ellipsis -->
  <nav class="breadcrumb" aria-label="breadcrumb" style="margin-top: 20px;">
    <ol>
      <li><a href="#">Home</a>
        <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </li>
      <li class="ellipsis">
        <svg viewBox="0 0 24 24"><path d="M6 12h.01M12 12h.01M18 12h.01" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="sr-only">More</span>
      </li>
      <li><span class="current-page" aria-current="page">Settings</span></li>
    </ol>
  </nav>
</body>
</html>
