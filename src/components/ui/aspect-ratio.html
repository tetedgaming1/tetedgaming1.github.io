<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aspect Ratio Example</title>
  <style>
    .aspect-ratio {
      position: relative;
      width: 100%;
      /* 16:9 aspect ratio example */
      padding-top: 56.25%;
    }
    .aspect-ratio > * {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="aspect-ratio">
    <img src="https://via.placeholder.com/800x450" alt="Example" />
  </div>
</body>
</html>
