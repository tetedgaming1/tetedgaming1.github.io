<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanilla Toggle</title>
<style>
  body {
    font-family: sans-serif;
    padding: 2rem;
  }

  .toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    border-radius: 0.375rem;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    padding: 0 0.5rem;
    height: 2.25rem;
    min-width: 2.25rem;
    background: transparent;
    border: none;
    user-select: none;
  }

  .toggle:hover {
    background-color: #f1f5f9; /* hover muted */
    color: #64748b;
  }

  .toggle:focus {
    outline: 2px solid #3b82f6; /* ring */
    outline-offset: 2px;
  }

  .toggle.disabled {
    opacity: 0.5;
    pointer-events: none;
  }

  .toggle.on {
    background-color: #3b82f6; /* accent */
    color: white; /* accent foreground */
  }

  /* size variants */
  .toggle.sm {
    height: 2rem;
    min-width: 2rem;
    font-size: 0.75rem;
    padding: 0 0.375rem;
  }

  .toggle.lg {
    height: 2.5rem;
    min-width: 2.5rem;
    font-size: 1rem;
    padding: 0 0.625rem;
  }

  /* outline variant */
  .toggle.outline {
    border: 1px solid #cbd5e1;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.05);
  }

  .toggle.outline:hover {
    background-color: #e2e8f0;
    color: #1e293b;
  }
</style>
</head>
<body>

<h2>Vanilla Toggle</h2>

<button class="toggle" data-variant="default" data-size="default">Default</button>
<button class="toggle outline" data-variant="outline" data-size="sm">Outline Small</button>
<button class="toggle" data-variant="default" data-size="lg">Large</button>
<button class="toggle" disabled>Disabled</button>

<script>
  // Toggle functionality
  document.querySelectorAll('.toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      btn.classList.toggle('on');
    });
  });
</script>

</body>
</html>
