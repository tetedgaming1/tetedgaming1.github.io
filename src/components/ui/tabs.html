<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Tabs</title>
<style>
  body {
    font-family: sans-serif;
    padding: 2rem;
    background-color: #f9fafb;
    color: #111827;
  }

  /* Tabs container */
  .tabs {
    width: 100%;
  }

  /* Tabs list (triggers) */
  .tabs-list {
    display: flex;
    background-color: #e5e7eb; /* muted bg */
    border-radius: 0.5rem;
    padding: 0.25rem;
    gap: 0.25rem;
  }

  /* Individual tab triggers */
  .tab-trigger {
    padding: 0.5rem 1rem;
    border-radius: 0.375rem;
    cursor: pointer;
    font-weight: 500;
    background-color: transparent;
    color: #6b7280; /* muted fg */
    transition: all 0.2s;
    border: none;
  }

  .tab-trigger:hover {
    background-color: #d1d5db; /* hover */
  }

  .tab-trigger.active {
    background-color: #ffffff; /* active bg */
    color: #111827; /* active fg */
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }

  /* Tabs content */
  .tabs-content {
    margin-top: 0.5rem;
    padding: 1rem;
    border-radius: 0.5rem;
    background-color: #ffffff;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    display: none;
  }

  .tabs-content.active {
    display: block;
  }
</style>
</head>
<body>

<h2>Tabs Example</h2>

<div class="tabs">
  <div class="tabs-list">
    <button class="tab-trigger active" data-tab="tab1">Tab 1</button>
    <button class="tab-trigger" data-tab="tab2">Tab 2</button>
    <button class="tab-trigger" data-tab="tab3">Tab 3</button>
  </div>
  <div id="tab1" class="tabs-content active">
    <p>This is the content of Tab 1.</p>
  </div>
  <div id="tab2" class="tabs-content">
    <p>This is the content of Tab 2.</p>
  </div>
  <div id="tab3" class="tabs-content">
    <p>This is the content of Tab 3.</p>
  </div>
</div>

<script>
  const triggers = document.querySelectorAll(".tab-trigger");
  const contents = document.querySelectorAll(".tabs-content");

  triggers.forEach(trigger => {
    trigger.addEventListener("click", () => {
      const target = trigger.dataset.tab;

      // Remove active class from all triggers & contents
      triggers.forEach(t => t.classList.remove("active"));
      contents.forEach(c => c.classList.remove("active"));

      // Add active class to clicked trigger & corresponding content
      trigger.classList.add("active");
      document.getElementById(target).classList.add("active");
    });
  });
</script>

</body>
</html>
